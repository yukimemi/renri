name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: renri
            archive_name: renri-x86_64-unknown-linux-gnu.tar.gz
            archive_cmd: tar
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: renri
            archive_name: renri-x86_64-apple-darwin.tar.gz
            archive_cmd: tar
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: renri
            archive_name: renri-aarch64-apple-darwin.tar.gz
            archive_cmd: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: renri.exe
            archive_name: renri-x86_64-pc-windows-msvc.zip
            archive_cmd: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar)
        if: matrix.archive_cmd == 'tar'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          cp README.md LICENSE dist/
          tar -C dist -czf ${{ matrix.archive_name }} ${{ matrix.artifact_name }} README.md LICENSE

      - name: Package (zip)
        if: matrix.archive_cmd == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/"
          Copy-Item "README.md" "dist/"
          Copy-Item "LICENSE" "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: cargo publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag '$tag' does not match Cargo.toml version '$crate'"
            exit 1
          fi

      - name: cargo test
        run: cargo test --locked

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --allow-dirty

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
